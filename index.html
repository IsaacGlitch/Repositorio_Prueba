<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda Gamer</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="shortcut icon" href="imagenes/favicon.jpg" type="image/x-icon">
</head>
<body>

    <header>
        <h1>Tienda Gamer</h1>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Juegos</a>
            <a href="#">Ofertas</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Bienvenido a la mejor tienda de videojuegos</h2>
        <p>Encuentra los mejores títulos al mejor precio</p>
    </section>

    <section class="productos">
        <h2>Juegos destacados</h2>

        <div class="contenedor">
            <div class="card">
                <img src="imagenes/supermario.jpg" alt="Juego 1" height="250px" width="300px">
                <h3>Super Mario Wonder</h3>
                <p>S/ 65.00</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="imagenes/sonicsuperstars.jpg" alt="Juego 2" height="250px" width="300px">
                <h3>Sonic SuperStars</h3>
                <p>S/ 209.00</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="imagenes/zelda.webp" alt="Juego 3" height="250px" width="300px">
                <h3>The Legend of Zelda</h3>
                <p>S/ 300.00</p>
                <button>Comprar</button>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Tienda Gamer - Todos los derechos reservados</p>
    </footer>

</body>
</html>
